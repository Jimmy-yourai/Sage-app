<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — SAGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<canvas id="particles"></canvas>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <div class="logo-orb">S</div>
      <div class="logo-text">
        <span class="logo-name">SAGE</span>
        <span class="logo-sub">اپنا راستہ، اپنی زندگی</span>
      </div>
    </a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-orb">S</div>
    </div>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">خوش آمدید — SAGE آپ کا انتظار کر رہا تھا</p>

    <div class="form-error" id="error-msg"></div>

    <div class="form-group">
      <label class="form-label">Email / ای میل</label>
      <input type="email" class="form-input" id="email" placeholder="your@email.com"/>
    </div>

    <div class="form-group">
      <label class="form-label">Password / پاسورڈ</label>
      <input type="password" class="form-input" id="password" placeholder="Your password"/>
    </div>

    <button class="form-btn" onclick="doLogin()">Login / لاگ ان کریں →</button>

    <div class="auth-switch">
      Don't have an account? <a href="signup.html">Sign up free / مفت سائن اپ کریں</a>
    </div>
  </div>
</div>

<script src="particles.js"></script>
<script>
function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  if (!email || !pass) { showError('Please fill all fields / تمام خانے پُر کریں'); return; }

  const users = JSON.parse(localStorage.getItem('sage_users') || '[]');
  const user = users.find(u => u.email === email && u.password === btoa(pass));

  if (!user) {
    showError('Incorrect email or password / ای میل یا پاسورڈ غلط ہے');
    return;
  }

  // Update streak
  const lastVisit = new Date(user.lastVisit);
  const today = new Date();
  const diffDays = Math.floor((today - lastVisit) / (1000*60*60*24));
  if (diffDays === 1) user.streakDays = (user.streakDays || 1) + 1;
  else if (diffDays > 1) user.streakDays = 1;
  user.lastVisit = today.toISOString();

  // Save updated user
  const idx = users.findIndex(u => u.email === email);
  users[idx] = user;
  localStorage.setItem('sage_users', JSON.stringify(users));
  localStorage.setItem('sage_user', JSON.stringify(user));

  window.location.href = 'app.html';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

if (localStorage.getItem('sage_user')) window.location.href = 'app.html';
</script>
</body>
</html>
