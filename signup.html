<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up — SAGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<canvas id="particles"></canvas>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <div class="logo-orb">S</div>
      <div class="logo-text">
        <span class="logo-name">SAGE</span>
        <span class="logo-sub">اپنا راستہ، اپنی زندگی</span>
      </div>
    </a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-orb">S</div>
    </div>
    <h1 class="auth-title">Join SAGE</h1>
    <p class="auth-sub">اپنا سفر شروع کریں — Start your journey</p>

    <div class="form-error" id="error-msg"></div>
    <div class="form-success" id="success-msg"></div>

    <div class="form-group">
      <label class="form-label">Your Name / آپ کا نام *</label>
      <input type="text" class="form-input" id="name" placeholder="e.g. Ahmad, Sara..." autocomplete="off"/>
    </div>

    <div class="form-group">
      <label class="form-label">Email Address / ای میل *</label>
      <input type="email" class="form-input" id="email" placeholder="your@email.com" autocomplete="off"/>
    </div>

    <div class="form-group">
      <label class="form-label">Password / پاسورڈ *</label>
      <input type="password" class="form-input" id="password" placeholder="At least 6 characters"/>
    </div>

    <div class="form-group">
      <label class="form-label">Confirm Password / پاسورڈ دوبارہ *</label>
      <input type="password" class="form-input" id="confirm-password" placeholder="Repeat your password"/>
    </div>

    <div class="form-group">
      <label class="form-label">Preferred Language / پسندیدہ زبان</label>
      <select class="form-input" id="lang" style="cursor:pointer;">
        <option value="en">English</option>
        <option value="ur">اردو — Urdu</option>
        <option value="ps">پښتو — Pashto</option>
      </select>
    </div>

    <button class="form-btn" onclick="doSignup()">Create Account / اکاؤنٹ بنائیں ✨</button>

    <div class="auth-switch">
      Already have an account? <a href="login.html">Login here / یہاں لاگ ان کریں</a>
    </div>
  </div>
</div>

<script src="particles.js"></script>
<script>
function doSignup() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  const confirm = document.getElementById('confirm-password').value;
  const lang = document.getElementById('lang').value;
  const errEl = document.getElementById('error-msg');
  const sucEl = document.getElementById('success-msg');

  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if (!name) { showError('Please enter your name / نام درج کریں'); return; }
  if (!email || !email.includes('@')) { showError('Please enter a valid email / درست ای میل درج کریں'); return; }
  if (pass.length < 6) { showError('Password must be at least 6 characters / پاسورڈ کم از کم 6 حروف کا ہونا چاہیے'); return; }
  if (pass !== confirm) { showError('Passwords do not match / پاسورڈ مطابقت نہیں رکھتے'); return; }

  // Check if email already exists
  const users = JSON.parse(localStorage.getItem('sage_users') || '[]');
  if (users.find(u => u.email === email)) {
    showError('This email is already registered / یہ ای میل پہلے سے رجسٹرڈ ہے');
    return;
  }

  // Save user
  const user = {
    name, email, lang,
    password: btoa(pass),
    joinDate: new Date().toISOString(),
    goals: [],
    conversations: 0,
    streakDays: 1,
    lastVisit: new Date().toISOString()
  };
  users.push(user);
  localStorage.setItem('sage_users', JSON.stringify(users));
  localStorage.setItem('sage_user', JSON.stringify(user));

  sucEl.textContent = 'Account created! Redirecting... / اکاؤنٹ بن گیا! ری ڈائریکٹ ہو رہا ہے...';
  sucEl.style.display = 'block';

  setTimeout(() => { window.location.href = 'app.html'; }, 1200);
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });

// Redirect if already logged in
if (localStorage.getItem('sage_user')) window.location.href = 'app.html';
</script>
</body>
</html>
